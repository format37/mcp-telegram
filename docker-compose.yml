services:
  mcp-telegram:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mcp-telegram
    restart: unless-stopped
    environment:
      - PORT=8019
      - TZ=UTC
      - MCP_NAME=telegram
    volumes:
      - ./.env:/app/.env:ro
    networks:
      - default
      - mcp-shared

networks:
  mcp-shared:
    external: true
